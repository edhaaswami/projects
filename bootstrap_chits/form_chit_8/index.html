<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Registration</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .form-box {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <div class="row justify-content-center">

        <div class="col-md-6">
            <div class="form-box">

                <h3 class="mb-4 text-center">Event Registration</h3>

                <!-- Form starts -->
                <form class="needs-validation" novalidate>

                    <!-- ================= NAME ================= -->
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="name" placeholder="Name" required>
                        <label for="name">Full Name</label>

                        <!-- Validation message -->
                        <div class="invalid-feedback">
                            Please enter your name.
                        </div>
                    </div>

                    <!-- ================= EMAIL ================= -->
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="email" placeholder="Email" required>
                        <label for="email">Email address</label>

                        <div class="invalid-feedback">
                            Enter a valid email.
                        </div>
                    </div>

                    <!-- ================= PHONE ================= -->
                    <div class="form-floating mb-3">
                        <input type="tel" class="form-control" id="phone" placeholder="Phone" required>
                        <label for="phone">Phone Number</label>

                        <div class="invalid-feedback">
                            Enter your phone number.
                        </div>
                    </div>

                    <!-- ================= EVENT TYPE ================= -->
                    <div class="mb-3">
                        <label class="form-label">Select Event</label>

                        <select class="form-select" required>
                            <option value="">Choose...</option>
                            <option>Workshop</option>
                            <option>Seminar</option>
                            <option>Hackathon</option>
                        </select>

                        <div class="invalid-feedback">
                            Please select an event.
                        </div>
                    </div>

                    <!-- ================= DATE ================= -->
                    <div class="form-floating mb-3">
                        <input type="date" class="form-control" required>
                        <label>Select Date</label>

                        <div class="invalid-feedback">
                            Please choose a date.
                        </div>
                    </div>

                    <!-- ================= TOOLTIP FIELD ================= -->
                    <div class="mb-3">
                        <label class="form-label">
                            Referral Code
                            <!-- Tooltip icon -->
                            <span data-bs-toggle="tooltip" title="Optional code if you were invited">
                                ℹ️
                            </span>
                        </label>

                        <input type="text" class="form-control" placeholder="Enter code (optional)">
                    </div>

                    <!-- ================= TERMS ================= -->
                    <div class="form-check mb-3">
                        <input type="checkbox" class="form-check-input" required>
                        <label class="form-check-label">
                            I agree to terms and conditions
                        </label>

                        <div class="invalid-feedback">
                            You must agree before submitting.
                        </div>
                    </div>

                    <!-- ================= SUBMIT ================= -->
                    <button class="btn btn-primary w-100">Register</button>

                </form>
                <!-- Form ends -->

            </div>
        </div>

    </div>
</div>

<!-- Bootstrap JS (needed for tooltip + validation) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // ================= VALIDATION SCRIPT =================
    (() => {
        'use strict';

        const forms = document.querySelectorAll('.needs-validation');

        forms.forEach(form => {
            form.addEventListener('submit', event => {

                if (!form.checkValidity()) {
                    event.preventDefault(); // stop submit
                    event.stopPropagation();
                }

                form.classList.add('was-validated'); // show validation UI
            });
        });
    })();

    // ================= TOOLTIP INIT =================
    const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]');

    tooltipTriggerList.forEach(el => {
        new bootstrap.Tooltip(el);
    });
</script>

</body>
</html>
