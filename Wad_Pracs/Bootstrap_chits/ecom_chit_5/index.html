<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>E-commerce Products</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa; /* light grey background */
        }

        .product-card img {
            height: 200px;
            object-fit: cover; /* keeps image nicely fitted */
        }

        .sidebar {
            background: white;
            padding: 15px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div class="container-fluid mt-3">

    <div class="row">

        <!-- ================= LEFT SIDEBAR FILTER ================= -->
        <div class="col-md-3 mb-3">

            <div class="sidebar">

                <h5>Filters</h5>

                <!-- Category Dropdown -->  <!--IMPORTANT-->
                <div class="dropdown mb-3">
                    <button class="btn btn-secondary dropdown-toggle w-100" data-bs-toggle="dropdown">
                        Select Category
                    </button>

                    <ul class="dropdown-menu w-100">
                        <li><a class="dropdown-item" href="#">All</a></li>
                        <li><a class="dropdown-item" href="#">Ceramic Mugs</a></li>
                        <li><a class="dropdown-item" href="#">Printed Mugs</a></li>
                        <li><a class="dropdown-item" href="#">Color Mugs</a></li>
                    </ul>
                </div>

                <!-- Price Filter -->
                <label>Price Range</label>
                <input type="range" class="form-range">

                <!-- Checkbox filters -->
                <div class="mt-3">
                    <label><input type="checkbox"> In Stock</label><br>
                    <label><input type="checkbox"> Free Delivery</label>
                </div>

            </div>
        </div>

        <!-- ================= PRODUCT GRID ================= -->
        <div class="col-md-9">

            <!-- Top bar -->
            <div class="d-flex justify-content-between mb-3">
                <h4>Mugs</h4>

                <!-- Sort dropdown -->
                <div class="dropdown">
                    <button class="btn btn-outline-secondary dropdown-toggle" data-bs-toggle="dropdown">
                        Sort by
                    </button>

                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#">Price Low to High</a></li>
                        <li><a class="dropdown-item" href="#">Price High to Low</a></li>
                        <li><a class="dropdown-item" href="#">Popularity</a></li>
                    </ul>
                </div>
            </div>

            <!-- Grid row -->
            <div class="row">

                <!-- PRODUCT CARD 1 -->
                <div class="col-lg-4 col-md-6 mb-4">
                    <div class="card product-card">

                        <img src="https://via.placeholder.com/300" class="card-img-top">

                        <div class="card-body">
                            <h6 class="card-title">Ceramic Mug 11oz</h6>
                            <p class="text-success">₹399</p>
                            <button class="btn btn-primary w-100">Add to Cart</button>
                        </div>

                    </div>
                </div>

                <!-- PRODUCT CARD 2 -->
                <div class="col-lg-4 col-md-6 mb-4">
                    <div class="card product-card">

                        <img src="https://via.placeholder.com/300" class="card-img-top">

                        <div class="card-body">
                            <h6 class="card-title">Accent Coffee Mug</h6>
                            <p class="text-success">₹499</p>
                            <button class="btn btn-primary w-100">Add to Cart</button>
                        </div>

                    </div>
                </div>

                <!-- PRODUCT CARD 3 -->
                <div class="col-lg-4 col-md-6 mb-4">
                    <div class="card product-card">

                        <img src="https://via.placeholder.com/300" class="card-img-top">

                        <div class="card-body">
                            <h6 class="card-title">White Coffee Mug</h6>
                            <p class="text-success">₹299</p>
                            <button class="btn btn-primary w-100">Add to Cart</button>
                        </div>

                    </div>
                </div>

                <!-- PRODUCT CARD 4 -->
                <div class="col-lg-4 col-md-6 mb-4">
                    <div class="card product-card">

                        <img src="https://via.placeholder.com/300" class="card-img-top">

                        <div class="card-body">
                            <h6 class="card-title">Black Mug</h6>
                            <p class="text-success">₹450</p>
                            <button class="btn btn-primary w-100">Add to Cart</button>
                        </div>

                    </div>
                </div>

                <!-- PRODUCT CARD 5 -->
                <div class="col-lg-4 col-md-6 mb-4">
                    <div class="card product-card">

                        <img src="https://via.placeholder.com/300" class="card-img-top">

                        <div class="card-body">
                            <h6 class="card-title">Custom Printed Mug</h6>
                            <p class="text-success">₹550</p>
                            <button class="btn btn-primary w-100">Add to Cart</button>
                        </div>

                    </div>
                </div>

                <!-- PRODUCT CARD 6 -->
                <div class="col-lg-4 col-md-6 mb-4">
                    <div class="card product-card">

                        <img src="https://via.placeholder.com/300" class="card-img-top">

                        <div class="card-body">
                            <h6 class="card-title">Travel Mug</h6>
                            <p class="text-success">₹699</p>
                            <button class="btn btn-primary w-100">Add to Cart</button>
                        </div>

                    </div>
                </div>

            </div>
        </div>

    </div>
</div>

<!-- Bootstrap JS (needed for dropdowns) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
