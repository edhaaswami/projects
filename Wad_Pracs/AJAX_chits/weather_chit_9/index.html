<!DOCTYPE html>
<html>
<head>
    <title>Weather App (Fetch AJAX)</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
            background: #f4f6f8;
        }

        input {
            padding: 10px;
            width: 200px;
        }

        button {
            padding: 10px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>

<body>

<h2>🌦 Weather App</h2>

<!-- Input field -->
<input type="text" id="city" placeholder="Enter city name">

<!-- Button -->
<button onclick="getWeather()">Get Weather</button>

<!-- Output -->
<h3 id="result"></h3>

<script>

// Function to fetch weather data
function getWeather() {

    // Get city input and convert to lowercase
    let city = document.getElementById("city").value.toLowerCase();

    // ✅ Fetch data from local JSON file (GET request)
    fetch("data.json")

        // Convert response into JSON format
        .then(response => response.json())

        // Process the data
        .then(allData => {

            // Get data for entered city
            let data = allData[city];

            // Display result
            if (data) {
                document.getElementById("result").innerHTML =
                    "🌡 Temperature: " + data.temp + "<br>" +
                    "💧 Humidity: " + data.humidity + "<br>" +
                    "☁ Condition: " + data.condition;
            } else {
                document.getElementById("result").innerHTML = "❌ City not found!";
            }
        })

        // Handle errors
        .catch(error => {
            document.getElementById("result").innerHTML = "Error loading data";
            console.log(error);
        });
}

</script>

</body>
</html>
