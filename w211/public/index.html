<!DOCTYPE html>
<html>
<head>
    <title>Student Marks Dashboard</title>
</head>
<body>

<h1>🎓 Student Marks Dashboard</h1>

<button onclick="insertData()">Insert Data</button>
<button onclick="loadData()">Show All</button>
<button onclick="filterDSBDA()">DSBDA > 20</button>
<button onclick="updateMarks()">Increase Marks</button>
<button onclick="above25()">All > 25</button>
<button onclick="lessThan40()">Less than 40</button>

<br><br>

<table border="1">
    <thead>
        <tr>
            <th>Name</th>
            <th>Roll</th>
            <th>WAD</th>
            <th>DSBDA</th>
            <th>CNS</th>
            <th>CC</th>
            <th>AI</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<script>

async function insertData() {
    await fetch('/insert');
    alert("Data Inserted");
}

async function loadData() {
    const res = await fetch('/all');
    const data = await res.json();
    display(data);
}

async function filterDSBDA() {
    const res = await fetch('/dsbda');
    const data = await res.json();
    display(data);
}

async function updateMarks() {
    await fetch('/update');
    alert("Marks Updated");
    loadData();
}

async function above25() {
    const res = await fetch('/above25');
    const data = await res.json();
    display(data);
}

async function lessThan40() {
    const res = await fetch('/lessthan40');
    const data = await res.json();
    display(data);
}

function display(data) {
    const table = document.getElementById("tableBody");
    table.innerHTML = "";

    data.forEach(s => {
        table.innerHTML += `
        <tr>
            <td>${s.Name}</td>
            <td>${s.Roll_No}</td>
            <td>${s.WAD_Marks}</td>
            <td>${s.DSBDA_Marks}</td>
            <td>${s.CNS_Marks}</td>
            <td>${s.CC_Marks}</td>
            <td>${s.AI_Marks}</td>
        </tr>`;
    });
}

</script>

</body>
</html>
