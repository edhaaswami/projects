<!DOCTYPE html>
<html>
<head>
    <title>Employee Directory</title>

    <style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    margin: 0;
    padding: 20px;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

/* Container */
#employeeList {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

/* Card */
.card {
    background: white;
    border-radius: 10px;
    padding: 15px;
    margin: 10px;
    width: 280px;
    display: flex;
    align-items: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.03);
}

/* Image */
.card img {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    margin-right: 15px;
    object-fit: cover;
}

/* Text */
.card h3 {
    margin: 0;
}

.card p {
    margin: 3px 0;
    font-size: 14px;
}
</style>
</head>

<body>

<h2>Employee Directory</h2>

<div id="employeeList"></div>

<script>
fetch('/api/employees')
    .then(res => res.json())
    .then(data => {

        let container = document.getElementById("employeeList");

        data.forEach(emp => {
            let card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
                <img src="${emp.image}">
                <div>
                    <h3>${emp.name}</h3>
                    <p><b>Designation:</b> ${emp.designation}</p>
                    <p><b>Department:</b> ${emp.department}</p>
                    <p><b>Salary:</b> ₹${emp.salary}</p>
                </div>
            `;

            container.appendChild(card);
        });

    })
    .catch(err => console.log(err));
</script>

</body>
</html>
